services:
  postgres:
    # TimescaleDB + pgvector bundled. Honors POSTGRES_* env and initdb.d.
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: blazeaid
      POSTGRES_PASSWORD: blazeaid
      POSTGRES_DB: blazeaid
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blazeaid -d blazeaid"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      ADDR: ":8080"
      DATABASE_URL: "postgres://blazeaid:blazeaid@postgres:5432/blazeaid?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "dev-insecure-secret-change-me"
      ENV: "development"
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    entrypoint: ["/worker"]
    environment:
      DATABASE_URL: "postgres://blazeaid:blazeaid@postgres:5432/blazeaid?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      ENV: "development"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
